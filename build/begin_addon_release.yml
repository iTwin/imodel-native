name: Begin-Addon-Release-$(Date:yyyy.MM.dd)$(Rev:.r)

trigger:
  branches:
    include:
    - main
    - release/*

  paths:
    exclude:
    - iModelJsNodeAddon/package_version.txt
    - build/*

pr: none

variables:
- group: imodel-native secret variables

stages:
- stage: queue_bump_version
  displayName: Queue bump-version.yml
  jobs:
  - job: read_pr_and_queue_bump
    displayName: Get Build Num then Queue
    pool:
      vmImage: ubuntu-latest

    steps:
      - checkout: self
        persistCredentials: true
      - task: NodeTool@0
        inputs:
          versionSpec: '18.x'

      - bash: az devops configure --defaults organization=$(System.TeamFoundationCollectionUri) project=$(System.TeamProject)
        displayName: Setup Azure CLI

      - bash: |
            set -euo pipefail

            skipPatchBump() {
              echo "$1"
              echo "##vso[task.setvariable variable=ITWINJS_PR_NUM;isoutput=true]0"
              echo "##vso[task.setvariable variable=SHOULD_QUEUE_PATCH;isoutput=true]false"
              exit 0
            }

            # Read the Azure-expanded commit message from env so bash does not
            # treat titles like "foo (#1234)" as command substitution.
            commitMsg="$BUILD_SOURCE_VERSION_MESSAGE"

            if [[ "$commitMsg" == "bump @itwin/* dev dependencies to next minor version" ]]; then
              skipPatchBump "Skipping patch bump for the automation-generated dev dependency update."
            fi

            # Use grep to parse commit message for PR number attached to end of the commit.
            nativePrNumber=$(echo "$commitMsg" | grep -oE '\(#([0-9]+)\)$' | grep -o '[0-9]\+' || true)
            if [[ -z "$nativePrNumber" ]]; then
              skipPatchBump "Skipping patch bump because no PR number could be parsed from the commit message."
            fi
            echo "Native PR Num: $nativePrNumber"

            # Store PR description in txt file because vars behave strangely with multi line comments.
            gh pr view $nativePrNumber --json body --repo iTwin/imodel-native -q '.body' > body.txt

            # Parse body.txt, searching for the itwinjs-core PR URL and extract its pull number.
            itwinjsPR=$(grep -o '^itwinjs-core: https://github.com/iTwin/itwinjs-core/pull/[0-9]\+' body.txt | grep -o '[0-9]\+' || true)
            echo "itwinjs-core PR num $itwinjsPR"

            # Default itwinjs PR to 0. bump_version.py treats 0 as "no linked PR".
            if [[ -z "$itwinjsPR" ]]; then
              itwinjsPR='0'
              echo "No itwinjs-core PR found. Defaulting PR num to: $itwinjsPR"
            fi

            echo "##vso[task.setvariable variable=ITWINJS_PR_NUM;isoutput=true]$itwinjsPR"
            echo "##vso[task.setvariable variable=SHOULD_QUEUE_PATCH;isoutput=true]true"

        env:
          BUILD_SOURCE_VERSION_MESSAGE: $(Build.SourceVersionMessage)
          GITHUB_TOKEN: $(GH_TOKEN)
        displayName: get itwinjs pr
        name: getItwinjsPr

      - bash: |
          az pipelines run \
            --branch $(Build.SourceBranch) \
            --id 8467 \
            --parameters "BumpType=patch" "iTwinjsPrNum=$(getItwinjsPr.ITWINJS_PR_NUM)"
        displayName: queue bump-version.yml
        env:
          AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
        condition: eq(variables['getItwinjsPr.SHOULD_QUEUE_PATCH'], 'true')
